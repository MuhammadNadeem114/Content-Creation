<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #00d4ff;
      letter-spacing: 4px;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .search-area {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 600px;
    }

    input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid #00d4ff;
      background: #1a1a1a;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    input::placeholder { color: #555; }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 50px;
      background: #00d4ff;
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s;
    }

    button:active { transform: scale(0.95); }

    #grid {
      columns: 3;
      gap: 15px;
      width: 100%;
      max-width: 900px;
    }

    #grid img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      display: block;
      transition: transform 0.3s;
      cursor: pointer;
    }

    #grid img:hover { transform: scale(1.03); }

    #loadMore {
      display: none;
      margin-top: 20px;
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      background: #ffffff15;
      color: white;
      border: 2px solid #ffffff33;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    #loader {
      display: none;
      color: #ffffff55;
      margin-top: 20px;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>🔍 IMAGE SEARCH</h1>

  <div class="search-area">
    <input type="text" id="searchInput" placeholder="Search anything..." />
    <button id="searchBtn">SEARCH</button>
  </div>

  <div id="grid"></div>
  <p id="loader">Loading...</p>
  <button id="loadMore">LOAD MORE</button>

  <script>
    // Unsplash API key — unsplash.com/developers pe free account bana ke milti hai
    const API_KEY = 'YOUR_UNSPLASH_API_KEY';

    // HTML se elements pakad liye
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const grid = document.getElementById('grid');
    const loadMore = document.getElementById('loadMore');
    const loader = document.getElementById('loader');

    // current search query store karne ke liye
    let currentQuery = '';

    // current page track karne ke liye — load more ke liye
    let currentPage = 1;

    // search button click hone pe
    searchBtn.addEventListener('click', () => {

      // input value li aur extra spaces hataye
      const query = searchInput.value.trim();

      // agar empty ho toh kuch mat karo
      if (!query) return;

      // query save karo
      currentQuery = query;

      // page 1 se shuru karo
      currentPage = 1;

      // grid clear karo naye results ke liye
      grid.innerHTML = '';

      // images fetch karo
      fetchImages();
    });

    // enter key pe bhi search ho
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchBtn.click();
    });

    // load more button click hone pe
    loadMore.addEventListener('click', () => {

      // next page pe jao
      currentPage++;

      // aur images fetch karo
      fetchImages();
    });

    // images fetch karne ka main function
    async function fetchImages() {

      // loader dikhai do
      loader.style.display = 'block';

      // load more hide karo jab tak response na aaye
      loadMore.style.display = 'none';

      // Unsplash API ko request bheji — async await se
      const response = await fetch(
        `https://api.unsplash.com/search/photos?query=${currentQuery}&page=${currentPage}&per_page=12&client_id=${API_KEY}`
      );

      // response ko JSON mein convert kiya
      const data = await response.json();

      // loader hide karo
      loader.style.display = 'none';

      // har image ke liye img tag banao
      data.results.forEach(photo => {

        // naya img element banaya
        const img = document.createElement('img');

        // Unsplash se small size image URL set ki
        img.src = photo.urls.small;

        // accessibility ke liye alt text
        img.alt = photo.alt_description || currentQuery;

        // image click pe original page kholo
        img.addEventListener('click', () => {
          window.open(photo.links.html, '_blank');
        });

        // grid mein add kiya
        grid.appendChild(img);
      });

      // load more button dikhai do
      loadMore.style.display = 'block';
    }
  </script>

</body>
</html>
