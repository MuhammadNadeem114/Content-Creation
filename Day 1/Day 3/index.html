<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Clock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    h2 {
      color: #ffffff55;
      letter-spacing: 6px;
      font-size: 1rem;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    #clock {
      font-size: 6rem;
      color: #00d4ff;
      letter-spacing: 8px;
      font-weight: bold;
    }

    #date {
      margin-top: 20px;
      color: #ffffff66;
      font-size: 1.1rem;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>

  <h2>Current Time</h2>
  <div id="clock">00:00:00</div>
  <div id="date"></div>

  <script>
    // HTML se clock aur date element le liye
const clock = document.getElementById('clock');
const dateEl = document.getElementById('date');

// ye function har second chalega aur time update karega
function updateTime() {

  // JavaScript ka built-in object — current date & time deta hai
  const now = new Date();

  // getHours() se ghante nikale — padStart ensure karta hai 09 ho na ke sirf 9
  let h = now.getHours().toString().padStart(2, '0');

  // getMinutes() se minute nikale — same 2 digit format
  let m = now.getMinutes().toString().padStart(2, '0');

  // getSeconds() se second nikale — same 2 digit format
  let s = now.getSeconds().toString().padStart(2, '0');

  // template literal — backticks mein variables inject karke time dikhaya
  clock.textContent = `${h}:${m}:${s}`;

  // built-in method — date automatically readable format mein deta hai
  dateEl.textContent = now.toDateString();
}

// har 1000ms yani 1 second pe updateTime function call hoga
setInterval(updateTime, 1000);

// page load hote hi ek baar turant time dikhao — warna pehla second blank hoga
updateTime();
  </script>

</body>
</html>
